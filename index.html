<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revenue Factor Model</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    background:#f4f6fa;
    margin:0;
    padding:15px;
    padding-bottom:220px;
}

h2 { margin-top:0; }

input {
    width:80px;
    padding:6px;
    border-radius:6px;
    border:1px solid #ddd;
}

.meta {
    width:140px;
}

table {
    width:100%;
    background:white;
    border-radius:12px;
    overflow:hidden;
    font-size:14px;
}

td,th {
    padding:8px;
    text-align:center;
}

.panel {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:15px;
    border-top:1px solid #ddd;
    max-height:45%;
    overflow:auto;
}

button {
    padding:6px 10px;
    margin:5px;
}

.active {
    background:#4a6cff;
    color:white;
}

.green { color:green; }
.red { color:red; }
</style>
</head>

<body>

<h2>Revenue Factor Model</h2>

<div style="margin-bottom:10px;">
Number of Groups:
<input id="groupCount" value="5">
<button onclick="build()">Build Model</button>
</div>

<!-- PERIODS -->
<div style="display:flex; gap:20px; margin-bottom:10px;">

<div>
<b>Period 1</b><br>
<input class="meta" id="m0" placeholder="Month">
<input class="meta" id="t0" placeholder="Type (Actual/Plan)">
</div>

<div>
<b>Period 2</b><br>
<input class="meta" id="m1" placeholder="Month">
<input class="meta" id="t1" placeholder="Type (Actual/Plan)">
</div>

</div>

<div id="tableContainer"></div>

<div class="panel">

<div><b id="label0">Period 1:</b> <span id="R0"></span></div>
<div><b id="label1">Period 2:</b> <span id="R1"></span></div>
<div><b>Revenue Change:</b> <span id="dr"></span></div>

<button onclick="setMode('money')" class="active">Revenue</button>
<button onclick="setMode('percent')">Percent</button>
<button onclick="setMode('share')">Share</button>

<div id="impact"></div>

</div>

<script>

let mode="money";
let groups=5;

function build(){

groups = +document.getElementById('groupCount').value || 1;

let html = `<table>
<tr>
<th>Group</th>
<th>Quantity (1)</th><th>Average Price (1)</th>
<th>Quantity (2)</th><th>Average Price (2)</th>
<th>Revenue (1)</th><th>Revenue (2)</th>
<th>Share (1)</th><th>Share (2)</th><th>Share Change</th>
</tr>`;

for(let i=0;i<groups;i++){
html += `<tr>
<td>Group ${i+1}</td>
<td><input id="q0_${i}"></td>
<td><input id="p0_${i}"></td>
<td><input id="q1_${i}"></td>
<td><input id="p1_${i}"></td>
<td id="r0_${i}"></td>
<td id="r1_${i}"></td>
<td id="s0_${i}"></td>
<td id="s1_${i}"></td>
<td id="ds_${i}"></td>
</tr>`;
}

html += `</table>`;

document.getElementById('tableContainer').innerHTML = html;

addEnterNav();
calc();
}

function setMode(m){
mode=m;
calc();
}

function format(n){
return n.toLocaleString('en-US');
}

function updateLabels(){
let l0 = document.getElementById('m0').value + " " + document.getElementById('t0').value;
let l1 = document.getElementById('m1').value + " " + document.getElementById('t1').value;

document.getElementById('label0').innerText = l0 || "Period 1";
document.getElementById('label1').innerText = l1 || "Period 2";
}

function calc(){

updateLabels();

let Revenue1=0, Revenue2=0;
let r1=[], r2=[];

// revenue calculation
for(let i=0;i<groups;i++){

let q1=+document.getElementById('q0_'+i)?.value||0;
let p1=+document.getElementById('p0_'+i)?.value||0;
let q2=+document.getElementById('q1_'+i)?.value||0;
let p2=+document.getElementById('p1_'+i)?.value||0;

r1[i]=q1*p1;
r2[i]=q2*p2;

Revenue1+=r1[i];
Revenue2+=r2[i];

document.getElementById('r0_'+i).innerText=format(r1[i]);
document.getElementById('r1_'+i).innerText=format(r2[i]);
}

document.getElementById('R0').innerText=format(Revenue1);
document.getElementById('R1').innerText=format(Revenue2);
document.getElementById('dr').innerText=format(Revenue2-Revenue1);

// shares
for(let i=0;i<groups;i++){

let s1 = Revenue1 ? r1[i]/Revenue1*100 : 0;
let s2 = Revenue2 ? r2[i]/Revenue2*100 : 0;
let ds = s2 - s1;

document.getElementById('s0_'+i).innerText = s1.toFixed(1)+"%";
document.getElementById('s1_'+i).innerText = s2.toFixed(1)+"%";
document.getElementById('ds_'+i).innerHTML =
`<span class="${ds>=0?"green":"red"}">${ds.toFixed(1)} pp</span>`;
}

// impact
let out="";

for(let i=0;i<groups;i++){

let delta=r2[i]-r1[i];
let pct=Revenue1?delta/Revenue1*100:0;

let color = delta>=0?"green":"red";

if(mode==="money"){
out+=`Group ${i+1}: <span class="${color}">${format(delta)}</span><br>`;
}

if(mode==="percent"){
out+=`Group ${i+1}: <span class="${color}">${pct.toFixed(1)}%</span><br>`;
}

if(mode==="share"){
let s1=r1[i]/Revenue1*100||0;
let s2=r2[i]/Revenue2*100||0;
let ds=s2-s1;

out+=`Group ${i+1}: ${s1.toFixed(1)}% → ${s2.toFixed(1)}% 
(<span class="${ds>=0?"green":"red"}">${ds.toFixed(1)} pp</span>)<br>`;
}
}

document.getElementById('impact').innerHTML=out;

}

document.addEventListener('input',calc);

function addEnterNav(){
const inputs = Array.from(document.querySelectorAll('input'));
inputs.forEach((input,i)=>{
input.addEventListener('keydown',e=>{
if(e.key==='Enter'){
e.preventDefault();
if(inputs[i+1]) inputs[i+1].focus();
}
});
});
}

build();

</script>

</body>
</html>>
