<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revenue Factor Analysis</title>

<style>
body {
    font-family: -apple-system;
    background:#f4f6fa;
    padding:15px;
}

input, select {
    width:110px;
    padding:6px;
    border-radius:6px;
    border:1px solid #ddd;
}

.group-name { width:150px; }

table { width:100%; background:white; border-radius:12px; }
td,th { padding:8px; text-align:center; }
th { white-space: pre-line; }

.top-bar { display:flex; gap:10px; flex-wrap:wrap; }

button {
    padding:6px 12px;
    border:none;
    border-radius:8px;
    background:#e0e6ff;
}

.active { background:#4a6cff; color:white; }

.green { color:green; }
.red { color:red; }

.panel {
    display:none;
    margin-top:10px;
    background:white;
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<h2>Revenue Factor Analysis</h2>

<div class="top-bar">

<div>Groups<br><input id="groupCount" value="5"></div>

<div>
Period Type<br>
<select id="periodType" onchange="fillSelectors()">
<option value="months">Months</option>
<option value="weeks">Weeks</option>
<option value="quarters">Quarters</option>
<option value="years">Years</option>
</select>
</div>

<div>
Source Period<br>
<select id="period0"></select>
<select id="type0">
<option>Actual</option>
<option>Planned</option>
</select>
</div>

<div>
Current Period<br>
<select id="period1"></select>
<select id="type1">
<option>Actual</option>
<option>Planned</option>
</select>
</div>

<div><br><button onclick="build()">Build</button></div>

</div>

<br>

<div id="tableContainer"></div>

<br>

<button onclick="togglePanel()">Analytical Insights</button>

<div class="panel" id="panel">

<div><b id="label0"></b>: <span id="R0_span"></span></div>
<div><b id="label1"></b>: <span id="R1_span"></span></div>
<div><b>Revenue Change:</b> <span id="dr"></span></div>

<button onclick="setMode('money')" id="btn_money" class="active">Amount</button>
<button onclick="setMode('percent')" id="btn_percent">Percent</button>
<button onclick="setMode('share')" id="btn_share">Share</button>

<div id="impact"></div>

<hr>

<div id="factors"></div>

</div>

<script>

let groups=5;
let mode="money";

function generatePeriods(){
let t=periodType.value;
let list=[];

if(t==="months"){
let m=["Jan.","Feb.","Mar.","Apr.","May","Jun.","Jul.","Aug.","Sep.","Oct.","Nov.","Dec."];
for(let y=2025;y<=2026;y++) for(let i=0;i<12;i++) list.push(m[i]+" "+y);
}
if(t==="weeks"){
for(let y=2025;y<=2026;y++) for(let i=1;i<=52;i++) list.push("W"+i+" "+y);
}
if(t==="quarters"){
for(let y=2025;y<=2026;y++) for(let i=1;i<=4;i++) list.push("Q"+i+" "+y);
}
if(t==="years") list=["2025","2026"];

return list;
}

function fillSelectors(){
let list=generatePeriods();
period0.innerHTML=period1.innerHTML=list.map(x=>`<option>${x}</option>`).join("");
period1.selectedIndex=1;
}

function build(){

groups=+groupCount.value||1;

let html=`<table>
<tr>
<th>Group</th>
<th>Q0</th><th>Q1</th>
<th>P0</th><th>P1</th>
<th>R0</th><th>R1</th>
<th>S0</th><th>S1</th><th>Δ</th>
</tr>`;

for(let i=0;i<groups;i++){
html+=`<tr>
<td><input class="group-name" id="g_${i}" value="Group ${i+1}"></td>
<td><input id="q0_${i}"></td>
<td><input id="q1_${i}"></td>
<td><input id="p0_${i}"></td>
<td><input id="p1_${i}"></td>
<td id="r0_${i}"></td>
<td id="r1_${i}"></td>
<td id="s0_${i}"></td>
<td id="s1_${i}"></td>
<td id="ds_${i}"></td>
</tr>`;
}

html+=`</table>`;
tableContainer.innerHTML=html;

calc();
}

function setMode(m){
mode=m;
document.querySelectorAll("#panel button").forEach(b=>b.classList.remove("active"));
document.getElementById("btn_"+m).classList.add("active");
calc();
}

function calc(){

let R0=0,R1=0;
let r0=[],r1=[];

for(let i=0;i<groups;i++){

let q0=+q0_[i]?.value||0;
let q1=+q1_[i]?.value||0;
let p0=+p0_[i]?.value||0;
let p1=+p1_[i]?.value||0;

r0[i]=q0*p0;
r1[i]=q1*p1;

R0+=r0[i];
R1+=r1[i];

r0_[i].innerText=r0[i];
r1_[i].innerText=r1[i];
}

R0_span.innerText=R0;
R1_span.innerText=R1;
dr.innerText=R1-R0;

let impactHTML="";
let qEffectTotal=0;
let pEffectTotal=0;

for(let i=0;i<groups;i++){

let name=g_[i].value;

let dq=(q1_[i].value - q0_[i].value)*p0_[i].value;
let dp=q1_[i].value*(p1_[i].value - p0_[i].value);

qEffectTotal+=dq;
pEffectTotal+=dp;

let delta=r1[i]-r0[i];

if(mode==="money") impactHTML+=`${name}: ${delta}<br>`;
if(mode==="percent") impactHTML+=`${name}: ${(delta/R0*100).toFixed(1)}%<br>`;
if(mode==="share"){
let s0=r0[i]/R0*100;
let s1=r1[i]/R1*100;
impactHTML+=`${name}: ${s0.toFixed(1)}% → ${s1.toFixed(1)}%<br>`;
}
}

impact.innerHTML=impactHTML;

let total=R1-R0;

factors.innerHTML=`
<b>Factor Analysis:</b><br>
Quantity effect: ${qEffectTotal} (${(qEffectTotal/R0*100).toFixed(1)}%)<br>
Price effect: ${pEffectTotal} (${(pEffectTotal/R0*100).toFixed(1)}%)
`;

}

function togglePanel(){
panel.style.display = panel.style.display==="block"?"none":"block";
}

document.addEventListener("input",calc);

fillSelectors();
build();

</script>

</body>
</html>
