<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revenue Factor Model</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    background:#f4f6fa;
    margin:0;
    padding:15px;
    padding-bottom:220px;
}

input, select {
    width:120px;
    padding:6px;
    border-radius:6px;
    border:1px solid #ddd;
}

table {
    width:100%;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

td,th {
    padding:8px;
    text-align:center;
}

.total {
    background:#eef2ff;
    font-weight:bold;
}

.panel {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:15px;
    border-top:1px solid #ddd;
}

.green { color:green; }
.red { color:red; }
</style>
</head>

<body>

<h2>Revenue Factor Model</h2>

<div>
Number of Groups:
<input id="groupCount" value="5">
<button onclick="build()">Build Model</button>
</div>

<br>

<!-- PERIOD SELECTORS -->
<div style="display:flex; gap:20px;">

<div>
<b>Period 1</b><br>
<select id="period0"></select>
<select id="type0">
<option>Actual</option>
<option>Planned</option>
</select>
</div>

<div>
<b>Period 2</b><br>
<select id="period1"></select>
<select id="type1">
<option>Actual</option>
<option>Planned</option>
</select>
</div>

</div>

<br>

<div id="tableContainer"></div>

<div class="panel">
<div><b id="label0">Period 1:</b> <span id="R0"></span></div>
<div><b id="label1">Period 2:</b> <span id="R1"></span></div>
<div><b>Revenue Change:</b> <span id="dr"></span></div>
</div>

<script>

let groups=5;

function generatePeriods(){

const months = [
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

let list=[];

for(let y=2025;y<=2026;y++){
for(let m=0;m<12;m++){
list.push(months[m]+" "+y);
}
}

return list;
}

function fillPeriodSelectors(){

let periods = generatePeriods();

let html="";

periods.forEach(p=>{
html+=`<option>${p}</option>`;
});

document.getElementById('period0').innerHTML=html;
document.getElementById('period1').innerHTML=html;

// дефолт
document.getElementById('period0').selectedIndex=0;
document.getElementById('period1').selectedIndex=1;
}

function build(){

groups = +document.getElementById('groupCount').value || 1;

let html = `<table>
<tr>
<th>Group</th>
<th>Quantity (1)</th><th>Average Price (1)</th>
<th>Quantity (2)</th><th>Average Price (2)</th>
<th>Revenue (1)</th><th>Revenue (2)</th>
</tr>`;

for(let i=0;i<groups;i++){
html += `<tr>
<td>Group ${i+1}</td>
<td><input id="q0_${i}"></td>
<td><input id="p0_${i}"></td>
<td><input id="q1_${i}"></td>
<td><input id="p1_${i}"></td>
<td id="r0_${i}"></td>
<td id="r1_${i}"></td>
</tr>`;
}

html += `<tr class="total">
<td>Total</td>
<td id="q0_total"></td>
<td id="p0_total"></td>
<td id="q1_total"></td>
<td id="p1_total"></td>
<td id="r0_total"></td>
<td id="r1_total"></td>
</tr>`;

html += `</table>`;

document.getElementById('tableContainer').innerHTML = html;

calc();
}

function format(n){
return n.toLocaleString('en-US');
}

function updateLabels(){

let p0 = document.getElementById('period0').value;
let t0 = document.getElementById('type0').value;

let p1 = document.getElementById('period1').value;
let t1 = document.getElementById('type1').value;

document.getElementById('label0').innerText = `${p0} (${t0})`;
document.getElementById('label1').innerText = `${p1} (${t1})`;
}

function calc(){

updateLabels();

let totalQ0=0,totalQ1=0;
let totalR0=0,totalR1=0;

for(let i=0;i<groups;i++){

let q0=+document.getElementById('q0_'+i)?.value||0;
let p0=+document.getElementById('p0_'+i)?.value||0;
let q1=+document.getElementById('q1_'+i)?.value||0;
let p1=+document.getElementById('p1_'+i)?.value||0;

let r0=q0*p0;
let r1=q1*p1;

totalQ0+=q0;
totalQ1+=q1;
totalR0+=r0;
totalR1+=r1;

document.getElementById('r0_'+i).innerText=format(r0);
document.getElementById('r1_'+i).innerText=format(r1);
}

// totals
document.getElementById('q0_total').innerText=format(totalQ0);
document.getElementById('q1_total').innerText=format(totalQ1);
document.getElementById('r0_total').innerText=format(totalR0);
document.getElementById('r1_total').innerText=format(totalR1);

let avg0 = totalQ0 ? totalR0/totalQ0 : 0;
let avg1 = totalQ1 ? totalR1/totalQ1 : 0;

document.getElementById('p0_total').innerText=format(Math.round(avg0));
document.getElementById('p1_total').innerText=format(Math.round(avg1));

document.getElementById('R0').innerText=format(totalR0);
document.getElementById('R1').innerText=format(totalR1);
document.getElementById('dr').innerText=format(totalR1-totalR0);

}

document.addEventListener('input',calc);
document.addEventListener('change',calc);

// init
fillPeriodSelectors();
build();

</script>

</body>
</html>
