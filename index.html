<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revenue Factor Analysis</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    background:#f4f6fa;
    margin:0;
    padding:15px;
    padding-bottom:260px;
}

input, select {
    width:100px;
    padding:6px;
    border-radius:6px;
    border:1px solid #ddd;
}

table {
    width:100%;
    background:white;
    border-radius:12px;
}

td,th { padding:8px; text-align:center; }

.total {
    background:#eef2ff;
    font-weight:bold;
}

.panel {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:15px;
    border-top:1px solid #ddd;
}

button {
    padding:6px 10px;
    margin:5px;
}

.active {
    background:#4a6cff;
    color:white;
}

.green { color:green; }
.red { color:red; }
</style>
</head>

<body>

<h2>Revenue Factor Analysis</h2>

<div>
Number of Groups:
<input id="groupCount" value="5">
<button onclick="build()">Build</button>
</div>

<br>

<div style="display:flex; gap:20px;">
<div>
<b>Period 1</b><br>
<select id="period0"></select>
<select id="type0">
<option>Actual</option>
<option>Planned</option>
</select>
</div>

<div>
<b>Period 2</b><br>
<select id="period1"></select>
<select id="type1">
<option>Actual</option>
<option>Planned</option>
</select>
</div>
</div>

<br>

<div id="tableContainer"></div>

<div class="panel">

<div><b id="label0"></b> <span id="R0_span"></span></div>
<div><b id="label1"></b> <span id="R1_span"></span></div>
<div><b>Revenue Change:</b> <span id="dr"></span></div>

<button onclick="setMode('money')" id="btn_money" class="active">Amount</button>
<button onclick="setMode('percent')" id="btn_percent">Percent</button>
<button onclick="setMode('share')" id="btn_share">Share</button>
<button onclick="fillTest()">Test</button>

<div id="impact"></div>

</div>

<script>

let groups=5;
let mode="money";

function generatePeriods(){
const months=["January","February","March","April","May","June",
"July","August","September","October","November","December"];

let list=[];
for(let y=2025;y<=2026;y++){
for(let m=0;m<12;m++){
list.push(months[m]+" "+y);
}}
return list;
}

function fillSelectors(){
let list=generatePeriods();
let html="";
list.forEach(p=>html+=`<option>${p}</option>`);
period0.innerHTML=html;
period1.innerHTML=html;
period1.selectedIndex=1;
}

function build(){

groups=+groupCount.value||1;

let html=`<table>
<tr>
<th>Group</th>
<th>Quantity (1)</th><th>Average check (1)</th>
<th>Quantity (2)</th><th>Average check (2)</th>
<th>Revenue (1)</th><th>Revenue (2)</th>
<th>Share (1)</th><th>Share (2)</th><th>Δ Share</th>
</tr>`;

for(let i=0;i<groups;i++){
html+=`<tr>
<td>Group ${i+1}</td>
<td><input id="q0_${i}"></td>
<td><input id="p0_${i}"></td>
<td><input id="q1_${i}"></td>
<td><input id="p1_${i}"></td>
<td id="r0_${i}"></td>
<td id="r1_${i}"></td>
<td id="s0_${i}"></td>
<td id="s1_${i}"></td>
<td id="ds_${i}"></td>
</tr>`;
}

html+=`<tr class="total">
<td>Total</td>
<td id="q0_total"></td>
<td id="p0_total"></td>
<td id="q1_total"></td>
<td id="p1_total"></td>
<td id="r0_total"></td>
<td id="r1_total"></td>
<td></td><td></td><td></td>
</tr>`;

html+=`</table>`;
tableContainer.innerHTML=html;

addEnterNav();
calc();

// фокус в первую ячейку
document.getElementById('q0_0')?.focus();
}

function setMode(m){
mode=m;
document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
document.getElementById("btn_"+m).classList.add("active");
calc();
}

function format(n){ return Math.round(n).toLocaleString('en-US'); }

function updateLabels(){
label0.innerText=`${period0.value} (${type0.value})`;
label1.innerText=`${period1.value} (${type1.value})`;
}

function calc(){

updateLabels();

let Q0=0,Q1=0,R0=0,R1=0;
let r0=[],r1=[];

for(let i=0;i<groups;i++){

let q0=+document.getElementById(`q0_${i}`)?.value||0;
let p0=+document.getElementById(`p0_${i}`)?.value||0;
let q1=+document.getElementById(`q1_${i}`)?.value||0;
let p1=+document.getElementById(`p1_${i}`)?.value||0;

r0[i]=q0*p0;
r1[i]=q1*p1;

Q0+=q0; Q1+=q1;
R0+=r0[i]; R1+=r1[i];

document.getElementById(`r0_${i}`).innerText=format(r0[i]);
document.getElementById(`r1_${i}`).innerText=format(r1[i]);
}

R0_span.innerText=format(R0);
R1_span.innerText=format(R1);
dr.innerText=format(R1-R0);

q0_total.innerText=format(Q0);
q1_total.innerText=format(Q1);
r0_total.innerText=format(R0);
r1_total.innerText=format(R1);

p0_total.innerText=Q0?format(R0/Q0):0;
p1_total.innerText=Q1?format(R1/Q1):0;

for(let i=0;i<groups;i++){
let s0=R0?r0[i]/R0*100:0;
let s1=R1?r1[i]/R1*100:0;
let ds=s1-s0;

document.getElementById(`s0_${i}`).innerText=s0.toFixed(1)+"%";
document.getElementById(`s1_${i}`).innerText=s1.toFixed(1)+"%";
document.getElementById(`ds_${i}`).innerHTML=
`<span class="${ds>=0?"green":"red"}">${ds.toFixed(1)} pp</span>`;
}

// impact
let out="";
for(let i=0;i<groups;i++){
let delta=r1[i]-r0[i];
let pct=R0?delta/R0*100:0;

if(mode==="money") out+=`Group ${i+1}: ${format(delta)}<br>`;
if(mode==="percent") out+=`Group ${i+1}: ${pct.toFixed(1)}%<br>`;
if(mode==="share"){
let s0=r0[i]/R0*100||0;
let s1=r1[i]/R1*100||0;
out+=`Group ${i+1}: ${s0.toFixed(1)}% → ${s1.toFixed(1)}%<br>`;
}
}

impact.innerHTML=out;
}

// ENTER navigation
function addEnterNav(){
let inputs=document.querySelectorAll("input");
inputs.forEach((el,i)=>{
el.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
inputs[i+1]?.focus();
}});
});
}

// ENTER на количестве групп
groupCount.addEventListener("keydown",function(e){
if(e.key==="Enter"){
e.preventDefault();
build();
}
});

document.addEventListener("input",calc);
document.addEventListener("change",calc);

fillSelectors();
build();

</script>

</body>
</html>
