<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revenue Factor Analysis (Quantity * Av.Price) + Direct Costs V.3.0 01:12 / Apr.09, 2026</title>

<style>
body { font-family:-apple-system; background:#f4f6fa; padding:15px; }

input, select {
    width:240px;
    padding:6px;
    border-radius:6px;
    border:1px solid #ddd;
}

.group-name { width:160px; }

table { width:100%; background:white; border-radius:12px; }
td,th { padding:8px; text-align:center; }

.total { background:#eef2ff; font-weight:bold; }

.top-bar { display:flex; gap:15px; flex-wrap:wrap; }

button {
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.build-btn {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color:white;
    font-weight:700;
    padding:12px 22px;
}

.test-btn {
    background:white;
    border:2px solid #d6dcff;
    font-weight:700;
    padding:10px 16px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.green { color:green; }
.red { color:red; }

.panel {
    display:none;
    margin-top:15px;
    background:white;
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<h2>Revenue Factor Analysis</h2>

<div class="top-bar">
<div>Groups<br><input id="groupCount" value="5"></div>

<div>
<br>
<button onclick="build()" class="build-btn">Build The Model NOW</button>
<button onclick="fillTest()" class="test-btn">Test</button>
</div>
</div>

<div id="tableContainer"></div>

<br>

<button onclick="togglePanel()" class="build-btn">Revenue Analysis</button>

<div class="panel" id="panel">
<div><b>Total Revenue:</b> <span id="R1_span"></span></div>
<div><b>Revenue Change:</b> <span id="dr"></span></div>
</div>

<!-- ================= COST BLOCK ================= -->

<h2 style="margin-top:30px;">Direct Costs</h2>

<div class="top-bar">
<div>
<br>
<button onclick="buildCost()" class="build-btn">Build Costs</button>
<button onclick="fillTestCost()" class="test-btn">Test</button>
</div>
</div>

<div id="costTableContainer"></div>

<!-- ================= MARGIN ================= -->

<h2 style="margin-top:30px;">Marginal Profit</h2>

<table>
<tr>
<th>Revenue</th>
<th>Costs</th>
<th>Margin</th>
</tr>
<tr class="total">
<td id="rev_total"></td>
<td id="cost_total"></td>
<td id="margin_total"></td>
</tr>
</table>

<script>

let groups=5;

// ================= REVENUE =================
function build(){

groups=+groupCount.value||1;

let html=`<table>
<tr>
<th>Group</th>
<th>Q0</th><th>Q1</th>
<th>P0</th><th>P1</th>
<th>R0</th><th>R1</th>
</tr>`;

for(let i=0;i<groups;i++){
html+=`<tr>
<td><input id="g_${i}" value="Group ${i+1}"></td>
<td><input id="q0_${i}"></td>
<td><input id="q1_${i}"></td>
<td><input id="p0_${i}"></td>
<td><input id="p1_${i}"></td>
<td id="r0_${i}"></td>
<td id="r1_${i}"></td>
</tr>`;
}

html+=`<tr class="total">
<td>Total</td>
<td colspan="4"></td>
<td id="r0_total"></td>
<td id="r1_total"></td>
</tr>`;

html+=`</table>`;
tableContainer.innerHTML=html;

calc();
}

// ================= COST =================
function buildCost(){

let html=`<table>
<tr>
<th>Group</th>
<th>Cost 0</th>
<th>Cost 1</th>
<th>Δ</th>
</tr>`;

for(let i=0;i<groups;i++){
html+=`<tr>
<td><input id="cg_${i}" value="Group ${i+1}"></td>
<td><input id="c0_${i}"></td>
<td><input id="c1_${i}"></td>
<td id="cd_${i}"></td>
</tr>`;
}

html+=`<tr class="total">
<td>Total</td>
<td id="c0_total"></td>
<td id="c1_total"></td>
<td id="cd_total"></td>
</tr>`;

html+=`</table>`;
costTableContainer.innerHTML=html;

calc();
}

// ================= CALC =================
function calc(){

let R0=0,R1=0;
let C0=0,C1=0;

// revenue
for(let i=0;i<groups;i++){
let q0=+document.getElementById(`q0_${i}`)?.value||0;
let q1=+document.getElementById(`q1_${i}`)?.value||0;
let p0=+document.getElementById(`p0_${i}`)?.value||0;
let p1=+document.getElementById(`p1_${i}`)?.value||0;

let r0=q0*p0;
let r1=q1*p1;

R0+=r0;
R1+=r1;

if(document.getElementById(`r0_${i}`)){
r0_${i}.innerText=format(r0);
r1_${i}.innerText=format(r1);
}
}

// costs
for(let i=0;i<groups;i++){
let c0=+document.getElementById(`c0_${i}`)?.value||0;
let c1=+document.getElementById(`c1_${i}`)?.value||0;

C0+=c0;
C1+=c1;

if(document.getElementById(`cd_${i}`)){
let d=c1-c0;
cd_${i}.innerHTML=`<span class="${d>=0?"red":"green"}">${format(d)}</span>`;
}
}

// totals
if(r0_total){
r0_total.innerText=format(R0);
r1_total.innerText=format(R1);
}

if(c0_total){
c0_total.innerText=format(C0);
c1_total.innerText=format(C1);
cd_total.innerText=format(C1-C0);
}

// margin
rev_total.innerText=format(R1);
cost_total.innerText=format(C1);
margin_total.innerText=format(R1-C1);

R1_span.innerText=format(R1);
dr.innerText=format(R1-R0);
}

// ================= TEST =================
function fillTest(){
for(let i=0;i<groups;i++){
q0_${i}.value=Math.floor(Math.random()*10)+1;
q1_${i}.value=Math.floor(Math.random()*10)+1;
p0_${i}.value=Math.floor(Math.random()*20000)+1000;
p1_${i}.value=Math.floor(Math.random()*20000)+1000;
}
calc();
}

function fillTestCost(){
for(let i=0;i<groups;i++){
c0_${i}.value=Math.floor(Math.random()*20000)+1000;
c1_${i}.value=Math.floor(Math.random()*20000)+1000;
}
calc();
}

function format(n){ return Math.round(n).toLocaleString('en-US'); }

function togglePanel(){
panel.style.display = panel.style.display==="block"?"none":"block";
}

document.addEventListener("input",calc);

build();
buildCost();

</script>

</body>
</html>
